<body>
    <script>
        function fibonacci(n) {
    let a = 0;
    let b = 1;

    for (let i = 1; i <= n; i++) {
        console.log(a);

        let next = a + b;
        a = b;
        b = next;
    }
}

fibonacci(7);
    </script>
